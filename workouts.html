<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#00ffd5" />
  <title>Workouts</title>

  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/workouts.css">
  <link rel="stylesheet" href="styles/feedback.css">
  <link rel="manifest" href="manifest.json">
</head>

<body class="app">

  <!-- ===================== -->
  <!-- HEADER -->
  <!-- ===================== -->
  <header class="header">
    <div class="headerNav">

      <!-- Left: Back button -->
      <a href="index.html" class="navBack" aria-label="Back to home">
        ←
      </a>
    
      <!-- Center: Logo + subtitle -->
      <div class="headerCenter">
        <img class="logo" src="Designer.png" alt="AI Trainer Logo" />
      </div>
    
      <!-- Right: Icons -->
      <div class="navRight">
        
        <button class="navIcon" aria-label="Progress">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="6" y1="20" x2="6" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="18" y1="20" x2="18" y2="14" />
          </svg>
        </button>

        <a href="profile.html" class="navIcon" aria-label="Profile">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6" />
          </svg>
        </a>
      </div>
    
    </div>
  </header>

  <!-- ===================== -->
  <!-- WEEK CIRCLES -->
  <!-- ===================== -->
  <section class="week" id="week" aria-label="Weekly workouts"></section>

  <!-- ===================== -->
  <!-- MAIN WORKOUT PANEL -->
  <!-- ===================== -->
  <main class="panel">

    <div class="panelHead">
      <div>
        <div class="panelTitle">Today’s Plan</div>
        <div class="panelMeta" id="panelMeta">Not generated yet</div>
      </div>
      <div class="pill" id="upperPill">—</div>
    </div>

    <div class="blocks" id="blocks">
      <div class="empty">
        Tap <strong>Generate Workout</strong> to build your 20–20–20 plan.
      </div>
    </div>

    <!-- ===================== -->
    <!-- POST-WORKOUT FEEDBACK -->
    <!-- ===================== -->
    <section id="postWorkout" class="postWorkout hidden">

      <h3 class="postTitle">Workout Feedback</h3>

      <div class="feedbackBlock">
        <div class="feedbackLabel">Difficulty</div>
        <div class="rating" id="difficultyRating">
          <div class="dot" data-value="1"></div>
          <div class="dot" data-value="2"></div>
          <div class="dot" data-value="3"></div>
          <div class="dot" data-value="4"></div>
          <div class="dot" data-value="5"></div>
        </div>
      </div>

      <div class="feedbackBlock">
        <div class="feedbackLabel">Weights Used (optional)</div>
        <div id="weightInputs"></div>
      </div>

      <button class="finishButton">Save &amp; Finish</button>

    </section>

  </main>

  <!-- ===================== -->
  <!-- DEBUG RESET (DEV ONLY) -->
  <!-- ===================== -->
  <button
    id="resetButton"
    class="resetButton"
  >
    Reset Today (Debug)
  </button>

  <!-- ===================== -->
  <!-- BOTTOM ACTION BUTTON -->
  <!-- ===================== -->
  <footer class="bottomBar">
    <button id="actionButton" class="actionButton">
      Generate Workout
    </button>
  </footer>

  <!-- ===================== -->
  <!-- WORKOUT LOGIC -->
  <!-- ===================== -->
  <script src="app.js"></script>

</body>
</html>
