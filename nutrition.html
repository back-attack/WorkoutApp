<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nutrition</title>

  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/header.css">
  <!-- reuse workouts styles for shared components like week circles -->
  <link rel="stylesheet" href="styles/workouts.css">
</head>

<body class="app">

  <!-- ===================== -->
  <!-- HEADER -->
  <!-- ===================== -->
  <header class="header">

    <div class="headerNav">

      <!-- Left: Back button -->
      <a href="index.html" class="navBack" aria-label="Back to home">
        ←
      </a>

      <!-- Center: Logo + subtitle -->
      <div class="headerCenter">
        <img class="logo" src="Designer.png" alt="AI Trainer Logo" />
      </div>

      <!-- Right icons -->
      <div class="navRight">
        <button class="navIcon" aria-label="Progress">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="6" y1="20" x2="6" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="18" y1="20" x2="18" y2="14" />
          </svg>
        </button>

        <a href="profile.html" class="navIcon" aria-label="Profile">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M6 20c0-3.3 2.7-6 6-6s6 2.7 6 6" />
          </svg>
        </a>
      </div>

    </div>

  </header>

  <!-- ===================== -->
  <!-- WEEK CIRCLES -->
  <!-- ===================== -->
  <section class="week" id="week" aria-label="Weekly nutrition"></section>

  <!-- ===================== -->
  <!-- CONTENT -->
  <!-- ===================== -->
  <main class="panel">

    <div class="nutritionActions">
      <button class="actionButton" id="startPrep">Start Meal Prepping</button>
      <button class="actionButton secondary" id="enterMeal">Enter Meal</button>
    </div>

    <!-- Two panels: breakfast first, dinner second -->
    <div id="mealPrepBreakfast" class="mealPrepPanel hidden">
      <div id="breakfastTitle" class="mealTitle"></div>
      <div id="breakfastInfo" class="mealInfo">
        <div id="breakfastName" class="mealName"></div>
        <button id="breakfastExplore" class="exploreBtn">Explore</button>
        <div id="breakfastDetails" class="mealDetails hidden"></div>
      </div>
      <div class="mealButtons">
        <button id="breakfastPrev" class="actionButton secondary">Previous</button>
        <button id="breakfastConfirm" class="actionButton">Confirm</button>
        <button id="breakfastNext" class="actionButton">Next</button>
      </div>
    </div>

    <div id="mealPrepDinner" class="mealPrepPanel hidden">
      <div id="dinnerTitle" class="mealTitle"></div>
      <div id="dinnerInfo" class="mealInfo">
        <div id="dinnerName" class="mealName"></div>
        <button id="dinnerExplore" class="exploreBtn">Explore</button>
        <div id="dinnerDetails" class="mealDetails hidden"></div>
      </div>
      <div class="mealButtons">
        <button id="dinnerPrev" class="actionButton secondary">Previous</button>
        <button id="dinnerConfirm" class="actionButton">Confirm</button>
        <button id="dinnerNext" class="actionButton">Next</button>
      </div>
    </div>

    <!-- generate shopping list button appears when both meals locked -->
    <div id="shoppingContainer" class="hidden" style="text-align:center; margin-top:16px;">
      <button id="generateList" class="actionButton">Generate Shopping List</button>
      <!-- shopping items will be injected here -->
      <div id="shoppingList" style="margin-top:12px;text-align:left;"></div>
      <button id="finalizeList" class="actionButton secondary hidden" style="margin-top:12px;">Confirm</button>
    </div>


  </main>

<!-- meal entry modal -->
    <div id="mealEntryOverlay" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;">
      <div class="modal" style="background:var(--card);padding:20px;border-radius:12px;width:90%;max-width:320px;display:flex;flex-direction:column;gap:12px;">
        <h3 style="color:var(--text);margin:0;">Enter Meals</h3>
        <button id="mealBreakfastBtn" class="actionButton">Breakfast</button>
        <button id="mealDinnerBtn" class="actionButton secondary">Dinner</button>
        <button id="closeMealEntry" class="actionButton secondary">Close</button>
      </div>
    </div>

    <!-- DEBUG RESET (DEV ONLY) -->
  <button id="resetButton" class="resetButton">
    Reset Today (Debug)
  </button>

  <!-- meal data separate from logic -->
  <script src="nutrition-data.js"></script>
  <!-- include shared logic (renders week + debug reset) -->
  <script src="app.js"></script>

</body>
</html>
